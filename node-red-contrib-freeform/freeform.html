<script type="text/x-red" data-template-name="freeform">
    <div class="form-row">
        <label for="node-input-name"><i class="icon-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-prompt"><i class="icon-pencil"></i> Prompt</label>
        <input type="text" id="node-input-prompt" placeholder="Enter your prompt">
    </div>
</script>

<script type="text/javascript">
    RED.nodes.registerType('freeform', {
        category: 'function',
        color: '#a6bbcf',
        defaults: {
            name: { value: "" },
            prompt: { value: "" }
        },
        inputs: 1,
        outputs: 1,
        icon: "freeform.png",
        label: function() {
            return this.name || "freeform";
        }
    });
</script>
